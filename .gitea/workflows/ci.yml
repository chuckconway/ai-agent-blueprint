name: API CI

on:
  push:
    branches: [dev, main]
    paths-ignore:
      - 'ui/**'
      - '*.md'
  pull_request:
    branches: [dev]
    paths-ignore:
      - 'ui/**'
      - '*.md'

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Validation (skip on main — already passed on dev)
  # ──────────────────────────────────────────────
  lint:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format
        run: uv run ruff format --check src/ tests/
      - name: Import linter
        run: uv run lint-imports

  typecheck:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Mypy
        run: uv run mypy --config-file pyproject.toml src/

  test:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Migration check
        run: uv run python scripts/check_migration_heads.py
      - name: Run tests
        run: uv run pytest tests/ -m "not integration" -v

  code-health:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Code health
        run: uv run python scripts/check_code_health.py
      - name: Dead code
        run: uv run vulture src/app/ vulture_whitelist.py --min-confidence 80 --exclude "*/tests/*,*test_*"
      - name: Unused deps
        run: uv run deptry src/

  # ──────────────────────────────────────────────
  # Build & Push (dev branch only)
  # ──────────────────────────────────────────────
  build:
    if: github.ref == 'refs/heads/dev'
    needs: [lint, typecheck, test, code-health]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          build-args: |
            APP_VERSION=dev-${{ github.sha }}

  # ──────────────────────────────────────────────
  # Promote (main branch — skip validation, promote image)
  # ──────────────────────────────────────────────
  promote:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull dev image and retag for production
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
