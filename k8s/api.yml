apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: app-dev
  labels:
    app: ai-agent-blueprint
    component: api
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: ai-agent-blueprint
    component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: app-dev
  labels:
    app: ai-agent-blueprint
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agent-blueprint
      component: api
  template:
    metadata:
      labels:
        app: ai-agent-blueprint
        component: api
    spec:
      containers:
        - name: api
          # Replace OWNER with your GitHub username or org
          image: ghcr.io/OWNER/ai-agent-blueprint:dev-latest
          imagePullPolicy: Always  # Use IfNotPresent for production
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DATABASE_USER):$(POSTGRES_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
