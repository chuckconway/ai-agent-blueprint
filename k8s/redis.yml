apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: app-dev
  labels:
    app: ai-agent-blueprint
    component: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: ai-agent-blueprint
    component: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: app-dev
  labels:
    app: ai-agent-blueprint
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent-blueprint
      component: redis
  template:
    metadata:
      labels:
        app: ai-agent-blueprint
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
