# Ingress configuration — uncomment and customize when ready to expose the API.
#
# Prerequisites:
#   - An ingress controller installed (e.g., nginx-ingress, traefik)
#   - DNS pointing your domain to the cluster's external IP
#   - (Optional) cert-manager for automatic TLS certificates
#
# ---
# apiVersion: networking.k8s.io/v1
# kind: Ingress
# metadata:
#   name: api-ingress
#   namespace: app-dev
#   labels:
#     app: ai-agent-blueprint
#     component: ingress
#   annotations:
#     # Nginx ingress controller
#     kubernetes.io/ingress.class: nginx
#     nginx.ingress.kubernetes.io/proxy-body-size: "10m"
#     nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
#     # Uncomment for cert-manager TLS
#     # cert-manager.io/cluster-issuer: letsencrypt-prod
# spec:
#   # Uncomment for TLS
#   # tls:
#   #   - hosts:
#   #       - api.your-domain.com
#   #     secretName: api-tls-secret
#   rules:
#     - host: api.your-domain.com  # Replace with your domain
#       http:
#         paths:
#           - path: /
#             pathType: Prefix
#             backend:
#               service:
#                 name: api
#                 port:
#                   number: 8000
